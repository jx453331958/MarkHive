<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkHive - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0e14;
  color: #c8d0da;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: #11151c;
  border: 1px solid #1e2530;
  border-radius: 12px;
  padding: 40px;
  width: 360px;
}
.login-box h1 {
  color: #e8ecf0;
  font-size: 24px;
  margin-bottom: 8px;
}
.login-box p {
  color: #5a6a7e;
  font-size: 14px;
  margin-bottom: 28px;
}
label {
  display: block;
  font-size: 13px;
  color: #5a6a7e;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 10px 14px;
  background: #0a0e14;
  border: 1px solid #1e2530;
  border-radius: 8px;
  color: #e8ecf0;
  font-size: 15px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: #7c5cff; }
button {
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  background: #7c5cff;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: background .2s;
}
button:hover { background: #6a4aee; }
.error {
  color: #f85149;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>
<div class="login-box">
  <h1>MarkHive</h1>
  <p>Enter password to continue</p>
  <form id="form">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" autofocus>
    <button type="submit">Login</button>
    <div class="error" id="error">Invalid password</div>
  </form>
</div>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  });
  if (res.ok) {
    window.location.href = '/';
  } else {
    document.getElementById('error').style.display = 'block';
  }
});
</script>
</body>
</html>
