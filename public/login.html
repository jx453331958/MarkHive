<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkHive - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e14;
  --surface: #11151c;
  --border: #1e2530;
  --text: #c8d0da;
  --text-bright: #e8ecf0;
  --text-muted: #5a6a7e;
  --accent: #7c5cff;
  --accent-hover: #6a4aee;
  --red: #f85149;
}
[data-theme="light"] {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --border: #e5e7eb;
  --text: #374151;
  --text-bright: #111827;
  --text-muted: #9ca3af;
  --accent: #6b4ce0;
  --accent-hover: #5a3cc8;
  --red: #dc2626;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  width: 360px;
  max-width: calc(100vw - 32px);
}
.login-box h1 {
  color: var(--text-bright);
  font-size: 24px;
  margin-bottom: 8px;
}
.login-box p {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 28px;
}
label {
  display: block;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-bright);
  font-size: 15px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--accent); }
button {
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: background .2s;
}
button:hover { background: var(--accent-hover); }
.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>
<div class="login-box">
  <h1 id="siteTitle">MarkHive</h1>
  <p>Enter password to continue</p>
  <form id="form">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" autofocus>
    <button type="submit">Login</button>
    <div class="error" id="error">Invalid password</div>
  </form>
</div>
<script>
// Apply saved theme (auto = follow system)
const theme = localStorage.getItem('markhive-theme') || 'auto';
const effective = theme === 'auto'
  ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
  : theme;
document.documentElement.setAttribute('data-theme', effective);

// Fetch site title
fetch('/api/config').then(r => r.json()).then(c => {
  if (c.title) {
    document.getElementById('siteTitle').textContent = c.title;
    document.title = c.title + ' - Login';
  }
}).catch(() => {});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  });
  if (res.ok) {
    window.location.href = '/';
  } else {
    document.getElementById('error').style.display = 'block';
  }
});
</script>
</body>
</html>
