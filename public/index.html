<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkHive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-deep: #0a0e14;
  --bg-surface: #11151c;
  --bg-elevated: #1a1f2e;
  --bg-hover: #1e2530;
  --accent: #7c5cff;
  --accent-dim: #5a3fd6;
  --text: #c8d0da;
  --text-bright: #e8ecf0;
  --text-muted: #5a6a7e;
  --border: #1e2530;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,.12);
  --red: #f85149;
  --red-bg: rgba(248,81,73,.12);
  --sidebar-w: 280px;
  --header-h: 52px;
}
[data-theme="light"] {
  --bg-deep: #f5f6f8;
  --bg-surface: #ffffff;
  --bg-elevated: #f0f1f4;
  --bg-hover: #e8eaef;
  --accent: #6b4ce0;
  --accent-dim: #5a3cc8;
  --text: #374151;
  --text-bright: #111827;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --green: #16a34a;
  --green-bg: rgba(22,163,74,.08);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,.08);
}
[data-theme="light"] ::-webkit-scrollbar-thumb { background: #d1d5db; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  overflow: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== Layout ===== */
.app { display: flex; height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-h);
}
.sidebar-header h1 {
  font-size: 18px;
  color: var(--text-bright);
  font-weight: 700;
  letter-spacing: -.3px;
}
.sidebar-header-right { display: flex; align-items: center; gap: 8px; }
.doc-count {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 2px 8px;
  border-radius: 10px;
}
.new-doc-btn {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: background .15s;
  line-height: 1;
}
.new-doc-btn:hover { background: var(--accent-dim); }
.search-box {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.doc-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.doc-item {
  padding: 10px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .15s, border-color .15s;
}
.doc-item:hover { background: var(--bg-hover); }
.doc-item.active {
  background: var(--bg-elevated);
  border-left-color: var(--accent);
}
.doc-item-title {
  font-size: 14px;
  color: var(--text-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.doc-item-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
}
.sidebar-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sort-btns { display: flex; gap: 4px; }
.sort-btn, .lang-btn {
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
}
.sort-btn:hover, .lang-btn:hover { color: var(--text); border-color: var(--text-muted); }
.sort-btn.active { color: var(--accent); border-color: var(--accent); }
.footer-right { display: flex; gap: 4px; }
.logout-btn {
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}
.logout-btn:hover { color: var(--red); border-color: var(--red); }

/* ===== Main Content ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  height: var(--header-h);
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.main-title {
  font-size: 16px;
  color: var(--text-bright);
  font-weight: 600;
}
.main-actions { display: flex; gap: 6px; }
.action-btn {
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
}
.action-btn:hover { color: var(--text); border-color: var(--text-muted); }
.action-btn.active { color: var(--accent); border-color: var(--accent); }
.action-btn.danger:hover { color: var(--red); border-color: var(--red); }
.main-body {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 15px;
}

/* ===== Markdown Styles ===== */
.markdown-body {
  max-width: 860px;
  margin: 0 auto;
  line-height: 1.75;
  animation: fadeIn .25s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.markdown-body h1 { font-size: 28px; color: var(--text-bright); margin: 32px 0 16px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.markdown-body h2 { font-size: 22px; color: var(--text-bright); margin: 28px 0 12px; font-weight: 600; }
.markdown-body h3 { font-size: 18px; color: var(--text-bright); margin: 24px 0 10px; }
.markdown-body h4 { font-size: 15px; color: var(--accent); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: .5px; }
.markdown-body p { margin: 0 0 16px; }
.markdown-body a { color: var(--accent); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: var(--bg-elevated);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
}
.markdown-body pre {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin: 0 0 16px;
  overflow-x: auto;
}
.markdown-body pre code { background: none; padding: 0; color: var(--text); }
.markdown-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 0 0 16px;
  background: rgba(124,92,255,.05);
  color: var(--text-muted);
  font-style: italic;
}
.markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 0 0 16px; }
.markdown-body li { margin: 4px 0; }
.markdown-body li::marker { color: var(--accent); }
.markdown-body table { width: 100%; border-collapse: collapse; margin: 0 0 16px; }
.markdown-body th, .markdown-body td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.markdown-body th { background: var(--bg-elevated); color: var(--text-bright); font-weight: 600; }
.markdown-body tr:hover td { background: var(--bg-hover); }
.markdown-body img { max-width: 100%; border-radius: 8px; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* ===== History View ===== */
.history-view {
  max-width: 860px;
  margin: 0 auto;
  animation: fadeIn .25s;
}
.history-title {
  font-size: 18px;
  color: var(--text-bright);
  margin-bottom: 20px;
}
.revision-list { list-style: none; }
.revision-item {
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .15s;
  cursor: default;
}
.revision-item:hover { background: var(--bg-elevated); }
.revision-left { flex: 1; min-width: 0; }
.revision-ver {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-right: 8px;
}
.revision-msg {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.revision-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.revision-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px; }
.revision-stats {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}
.stat-add { color: var(--green); }
.stat-del { color: var(--red); }
.rev-btn {
  padding: 4px 10px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.rev-btn:hover { color: var(--text); border-color: var(--text-muted); }

/* ===== Diff View ===== */
.diff-view {
  max-width: 960px;
  margin: 0 auto;
  animation: fadeIn .25s;
}
.diff-header-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.diff-title {
  font-size: 16px;
  color: var(--text-bright);
}
.diff-stats-summary {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
.diff-hunk {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
}
.diff-hunk-header {
  padding: 6px 12px;
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.diff-line {
  display: flex;
  min-height: 22px;
}
.diff-line-num {
  width: 44px;
  min-width: 44px;
  padding: 0 8px;
  text-align: right;
  color: var(--text-muted);
  user-select: none;
  font-size: 12px;
  line-height: 22px;
  opacity: .6;
}
.diff-line-content {
  flex: 1;
  padding: 0 12px;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 22px;
}
.diff-line.context { background: transparent; }
.diff-line.insert { background: var(--green-bg); }
.diff-line.insert .diff-line-content { color: var(--green); }
.diff-line.insert .diff-line-content::before { content: '+ '; }
.diff-line.delete { background: var(--red-bg); }
.diff-line.delete .diff-line-content { color: var(--red); }
.diff-line.delete .diff-line-content::before { content: '- '; }
.diff-line.context .diff-line-content::before { content: '  '; }
.diff-no-changes {
  padding: 32px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}

/* ===== Editor ===== */
.editor-view {
  max-width: 960px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  animation: fadeIn .25s;
}
.editor-toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.editor-title-input {
  flex: 1;
  padding: 8px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-bright);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.editor-title-input:focus { border-color: var(--accent); }
.editor-msg-input {
  width: 240px;
  padding: 8px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.editor-msg-input:focus { border-color: var(--accent); }
.editor-content {
  flex: 1;
  width: 100%;
  padding: 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  outline: none;
  tab-size: 2;
  transition: border-color .2s;
}
.editor-content:focus { border-color: var(--accent); }
.editor-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  flex-shrink: 0;
}
.editor-char-count {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}
.editor-btns { display: flex; gap: 8px; }
.save-btn {
  padding: 7px 20px;
  font-size: 13px;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
}
.save-btn:hover { background: var(--accent-dim); }
.save-btn:disabled { opacity: .5; cursor: not-allowed; }
.cancel-btn {
  padding: 7px 16px;
  font-size: 13px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
}
.cancel-btn:hover { color: var(--text); border-color: var(--text-muted); }

/* ===== Confirm Dialog ===== */
.dialog-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn .15s;
}
.dialog-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 360px;
}
.dialog-title {
  font-size: 16px;
  color: var(--text-bright);
  font-weight: 600;
  margin-bottom: 8px;
}
.dialog-msg {
  font-size: 14px;
  color: var(--text);
  margin-bottom: 20px;
  line-height: 1.5;
}
.dialog-btns {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.dialog-btn-cancel {
  padding: 7px 16px;
  font-size: 13px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
}
.dialog-btn-cancel:hover { color: var(--text); border-color: var(--text-muted); }
.dialog-btn-danger {
  padding: 7px 16px;
  font-size: 13px;
  color: #fff;
  background: var(--red);
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.dialog-btn-danger:hover { background: #d63a33; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 10px 20px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-bright);
  font-size: 13px;
  z-index: 200;
  animation: fadeIn .2s;
  pointer-events: none;
}
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

/* ===== Share Dialog ===== */
.share-form { display: flex; gap: 8px; margin-bottom: 16px; }
.share-select {
  flex: 1;
  padding: 7px 10px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.share-generate {
  padding: 7px 16px;
  font-size: 13px;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.share-generate:hover { background: var(--accent-dim); }
.share-link-list { max-height: 240px; overflow-y: auto; }
.share-link-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 12px;
}
.share-link-url {
  flex: 1;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.share-link-expiry {
  color: var(--text-muted);
  white-space: nowrap;
}
.share-link-expired { color: var(--red); }
.share-link-btn {
  padding: 3px 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.share-link-btn:hover { color: var(--text); border-color: var(--text-muted); }
.share-link-btn.danger:hover { color: var(--red); border-color: var(--red); }
.share-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 16px; }

/* ===== Mobile Menu ===== */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 20;
  width: 36px;
  height: 36px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    transition: transform .25s;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-toggle { display: flex; }
  .main-body { padding: 20px 16px; }
}

/* ===== Version Tag ===== */
.version-badge {
  display: inline-block;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 8px;
  font-family: 'JetBrains Mono', monospace;
}

/* ===== Loading ===== */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<button class="mobile-toggle" id="mobileToggle">&#9776;</button>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>MarkHive</h1>
      <div class="sidebar-header-right">
        <span class="doc-count" id="docCount">0</span>
        <button class="new-doc-btn" id="newDocBtn" title="">+</button>
      </div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput">
    </div>
    <div class="doc-list" id="docList"></div>
    <div class="sidebar-footer">
      <div class="sort-btns">
        <button class="sort-btn active" data-sort="time" id="sortTime"></button>
        <button class="sort-btn" data-sort="title" id="sortTitle"></button>
      </div>
      <div class="footer-right">
        <button class="sort-btn" id="themeBtn"></button>
        <button class="sort-btn" id="trashBtn" title="">&#128465;</button>
        <button class="lang-btn" id="langBtn"></button>
        <button class="logout-btn" id="logoutBtn"></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header" id="mainHeader" style="display:none">
      <div style="display:flex;align-items:center">
        <span class="main-title" id="mainTitle"></span>
        <span class="version-badge" id="versionBadge"></span>
      </div>
      <div class="main-actions" id="mainActions">
        <button class="action-btn" id="btnView"></button>
        <button class="action-btn" id="btnEdit"></button>
        <button class="action-btn" id="btnHistory"></button>
        <button class="action-btn" id="btnRaw"></button>
        <button class="action-btn" id="btnShare"></button>
        <button class="action-btn danger" id="btnDelete"></button>
      </div>
    </div>
    <div class="main-body" id="mainBody">

// ===== State =====
let allDocs = [];
let currentDoc = null;
let currentView = 'view'; // view | edit | history | diff | version
let sortMode = 'time-desc';
let searchQuery = '';
let lang = localStorage.getItem('markhive-lang') || 'zh';
let theme = localStorage.getItem('markhive-theme') || 'auto';
let isNewDoc = false;

function t(key) { return i18n[lang][key] || key; }

function getEffectiveTheme() {
  if (theme === 'auto') return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  return theme;
}

function applyTheme() {
  const effective = getEffectiveTheme();
  document.documentElement.setAttribute('data-theme', effective);
  localStorage.setItem('markhive-theme', theme);
  const btn = document.getElementById('themeBtn');
  const icons = { dark: '\u263E', light: '\u2600', auto: '\u25D1' };
  const labels = { dark: t('themeLight'), light: t('themeAuto'), auto: t('themeDark') };
  btn.textContent = icons[theme] || '\u25D1';
  btn.title = labels[theme] || '';
}

function applyLang() {
  localStorage.setItem('markhive-lang', lang);
  document.getElementById('searchInput').placeholder = t('searchPlaceholder');
  document.getElementById('sortTime').textContent = t('sortTime');
  document.getElementById('sortTitle').textContent = t('sortTitle');
  document.getElementById('logoutBtn').textContent = t('logout');
  document.getElementById('langBtn').textContent = t('langSwitch');
  document.getElementById('newDocBtn').title = t('newDoc');
  document.getElementById('trashBtn').title = t('trash');
  // Only update main action buttons if they exist (not in trash view)
  const btnView = document.getElementById('btnView');
  if (btnView) {
    btnView.textContent = t('view');
    document.getElementById('btnEdit').textContent = t('edit');
    document.getElementById('btnHistory').textContent = t('history');
    document.getElementById('btnRaw').textContent = t('raw');
    document.getElementById('btnShare').textContent = t('share');
    document.getElementById('btnDelete').textContent = t('delete');
  }
  applyTheme();
  const empty = document.getElementById('emptyState');
  if (empty) empty.textContent = t('selectDoc');
}

// ===== API =====
async function api(path, options = {}) {
  const res = await fetch(path, options);
  if (res.status === 401) {
    window.location.href = '/login.html';
    return null;
  }
  return res;
}

async function fetchDocs() {
  const q = searchQuery ? `?search=${encodeURIComponent(searchQuery)}` : '';
  const res = await api(`/api/docs${q}`);
  if (!res) return;
  allDocs = await res.json();
  renderDocList();
}

async function fetchDoc(id) {
  const res = await api(`/api/docs/${id}`);
  if (!res) return null;
  return res.json();
}

async function fetchHistory(id) {
  const res = await api(`/api/docs/${id}/history`);
  if (!res) return null;
  return res.json();
}

async function fetchVersion(id, version) {
  const res = await api(`/api/docs/${id}/versions/${version}`);
  if (!res) return null;
  return res.json();
}

async function fetchDiff(id, from, to) {
  const res = await api(`/api/docs/${id}/diff?from=${from}&to=${to}`);
  if (!res) return null;
  return res.json();
}

// ===== Toast =====
function showToast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ===== Confirm Dialog =====
function showConfirm(title, msg, onConfirm, confirmText) {
  const btnText = confirmText || t('confirmDelete');
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog-box">
      <div class="dialog-title">${escapeHtml(title)}</div>
      <div class="dialog-msg">${escapeHtml(msg)}</div>
      <div class="dialog-btns">
        <button class="dialog-btn-cancel" id="dialogCancel">${t('cancelBtn')}</button>
        <button class="dialog-btn-danger" id="dialogConfirm">${escapeHtml(btnText)}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#dialogCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#dialogConfirm').addEventListener('click', () => {
    overlay.remove();
    onConfirm();
  });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ===== Rendering =====
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  const rtf = lang === 'zh'
    ? { now: '刚刚', m: '分钟前', h: '小时前', d: '天前' }
    : { now: 'Just now', m: 'm ago', h: 'h ago', d: 'd ago' };
  if (diff < 60000) return rtf.now;
  if (diff < 3600000) return `${Math.floor(diff / 60000)}${rtf.m}`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}${rtf.h}`;
  if (diff < 604800000) return `${Math.floor(diff / 86400000)}${rtf.d}`;
  return d.toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function sortDocs(docs) {
  const sorted = [...docs];
  switch (sortMode) {
    case 'time-desc': sorted.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at)); break;
    case 'time-asc': sorted.sort((a, b) => new Date(a.updated_at) - new Date(b.updated_at)); break;
    case 'title-asc': sorted.sort((a, b) => a.title.localeCompare(b.title, lang === 'zh' ? 'zh' : 'en')); break;
    case 'title-desc': sorted.sort((a, b) => b.title.localeCompare(a.title, lang === 'zh' ? 'zh' : 'en')); break;
  }
  return sorted;
}

function renderDocList() {
  const list = document.getElementById('docList');
  const sorted = sortDocs(allDocs);
  document.getElementById('docCount').textContent = allDocs.length;

  list.innerHTML = sorted.map(doc => `
    <div class="doc-item${currentDoc && currentDoc.id === doc.id ? ' active' : ''}"
         data-id="${doc.id}">
      <div class="doc-item-title">${escapeHtml(doc.title)}</div>
      <div class="doc-item-meta">v${doc.version} · ${formatTime(doc.updated_at)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.doc-item').forEach(el => {
    el.addEventListener('click', () => selectDoc(el.dataset.id));
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function selectDoc(id) {
  const doc = await fetchDoc(id);
  if (!doc) return;
  currentDoc = doc;
  isNewDoc = false;
  // Restore main action buttons if coming from trash view
  if (currentView === 'trash') restoreMainActions();
  currentView = 'view';
  renderDocList();
  showDocView();
  document.getElementById('sidebar').classList.remove('open');
}

function showDocView() {
  currentView = 'view';
  const header = document.getElementById('mainHeader');
  const body = document.getElementById('mainBody');
  const empty = document.getElementById('emptyState');

  header.style.display = 'flex';
  if (empty) empty.style.display = 'none';
  document.getElementById('mainTitle').textContent = currentDoc.title;
  document.getElementById('versionBadge').textContent = `v${currentDoc.version}`;

  updateActionButtons('view');
  body.innerHTML = `<div class="markdown-body">${marked.parse(currentDoc.content)}</div>`;
}

function updateActionButtons(active) {
  const map = { view: 'btnView', edit: 'btnEdit', history: 'btnHistory', raw: 'btnRaw' };
  Object.entries(map).forEach(([key, id]) => {
    document.getElementById(id).classList.toggle('active', key === active);
  });
}

// ===== Editor =====
function showEditor(doc) {
  currentView = 'edit';
  const header = document.getElementById('mainHeader');
  const body = document.getElementById('mainBody');
  const empty = document.getElementById('emptyState');
  if (empty) empty.style.display = 'none';

  if (doc) {
    header.style.display = 'flex';
    document.getElementById('mainTitle').textContent = doc.title;
    document.getElementById('versionBadge').textContent = `v${doc.version}`;
    updateActionButtons('edit');
  } else {
    header.style.display = 'flex';
    document.getElementById('mainTitle').textContent = t('newDocTitle');
    document.getElementById('versionBadge').textContent = '';
    updateActionButtons('edit');
  }

  const titleVal = doc ? doc.title : '';
  const contentVal = doc ? doc.content : '';

  body.innerHTML = `
    <div class="editor-view">
      <div class="editor-toolbar">
        <input type="text" class="editor-title-input" id="editorTitle"
               placeholder="${t('titlePlaceholder')}" value="${escapeHtml(titleVal)}">
        <input type="text" class="editor-msg-input" id="editorMsg"
               placeholder="${t('messagePlaceholder')}">
      </div>
      <textarea class="editor-content" id="editorContent">${escapeHtml(contentVal)}</textarea>
      <div class="editor-footer">
        <span class="editor-char-count" id="editorStats"></span>
        <div class="editor-btns">
          <button class="cancel-btn" id="editorCancel">${t('cancel')}</button>
          <button class="save-btn" id="editorSave">${t('save')}</button>
        </div>
      </div>
    </div>
  `;

  const textarea = document.getElementById('editorContent');
  const statsEl = document.getElementById('editorStats');

  function updateStats() {
    const val = textarea.value;
    const chars = val.length;
    const lines = val ? val.split('\n').length : 0;
    statsEl.textContent = `${chars} ${t('chars')} · ${lines} ${t('lines')}`;
  }
  updateStats();
  textarea.addEventListener('input', updateStats);

  // Tab key support
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = start + 2;
      updateStats();
    }
    // Ctrl/Cmd+S to save
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      document.getElementById('editorSave').click();
    }
  });

  document.getElementById('editorCancel').addEventListener('click', () => {
    if (isNewDoc) {
      currentDoc = null;
      isNewDoc = false;
      document.getElementById('mainHeader').style.display = 'none';
      body.innerHTML = `<div class="empty-state" id="emptyState">${t('selectDoc')}</div>`;
    } else if (currentDoc) {
      showDocView();
    }
  });

  document.getElementById('editorSave').addEventListener('click', handleSave);
  textarea.focus();
}

async function handleSave() {
  const content = document.getElementById('editorContent').value.trim();
  if (!content) {
    showToast(t('contentEmpty'), 'error');
    return;
  }
  const title = document.getElementById('editorTitle').value.trim();
  const message = document.getElementById('editorMsg').value.trim();
  const saveBtn = document.getElementById('editorSave');
  saveBtn.textContent = t('saving');
  saveBtn.disabled = true;

  try {
    const bodyData = { content };
    if (title) bodyData.title = title;
    if (message) bodyData.message = message;

    let res;
    if (isNewDoc) {
      res = await api('/api/docs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyData)
      });
    } else {
      res = await api(`/api/docs/${currentDoc.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyData)
      });
    }

    if (res && res.ok) {
      const result = await res.json();
      showToast(t('saveSuccess'), 'success');
      isNewDoc = false;
      await fetchDocs();
      await selectDoc(result.id);
    } else {
      showToast(t('saveFailed'), 'error');
      saveBtn.textContent = t('save');
      saveBtn.disabled = false;
    }
  } catch (e) {
    showToast(t('saveFailed'), 'error');
    saveBtn.textContent = t('save');
    saveBtn.disabled = false;
  }
}

async function handleDelete() {
  if (!currentDoc) return;
  showConfirm(t('deleteTitle'), t('deleteMsg'), async () => {
    const res = await api(`/api/docs/${currentDoc.id}`, { method: 'DELETE' });
    if (res && res.ok) {
      showToast(t('deleteSuccess'), 'success');
      currentDoc = null;
      currentView = 'view';
      document.getElementById('mainHeader').style.display = 'none';
      document.getElementById('mainBody').innerHTML = `<div class="empty-state" id="emptyState">${t('selectDoc')}</div>`;
      await fetchDocs();
    } else {
      showToast(t('deleteFailed'), 'error');
    }
  });
}

// ===== History / Diff / Version =====
async function showHistory() {
  if (!currentDoc) return;
  currentView = 'history';
  updateActionButtons('history');

  const body = document.getElementById('mainBody');
  body.innerHTML = `<div class="loading">${t('loadingHistory')}</div>`;

  const data = await fetchHistory(currentDoc.id);
  if (!data) return;

  const revisions = data.revisions;
  body.innerHTML = `
    <div class="history-view">
      <div class="history-title">${t('versionHistory')}</div>
      <ul class="revision-list">
        ${revisions.map((rev, idx) => `
          <li class="revision-item">
            <div class="revision-left">
              <div>
                <span class="revision-ver">v${rev.version}</span>
                <span class="revision-msg">${escapeHtml(rev.message || t('noMessage'))}</span>
              </div>
              <div class="revision-time">${new Date(rev.created_at).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US')}</div>
            </div>
            <div class="revision-right">
              <span class="revision-stats">
                ${rev.additions > 0 ? `<span class="stat-add">+${rev.additions}</span>` : ''}
                ${rev.deletions > 0 ? ` <span class="stat-del">-${rev.deletions}</span>` : ''}
                ${rev.additions === 0 && rev.deletions === 0 ? `<span style="color:var(--text-muted)">${t('noChange')}</span>` : ''}
              </span>
              <button class="rev-btn" data-action="view-version" data-version="${rev.version}">${t('viewBtn')}</button>
              ${idx < revisions.length - 1 ? `
                <button class="rev-btn" data-action="diff"
                        data-from="${revisions[idx + 1].version}"
                        data-to="${rev.version}">${t('diffBtn')}</button>
              ` : ''}
            </div>
          </li>
        `).join('')}
      </ul>
    </div>
  `;

  body.querySelectorAll('[data-action="view-version"]').forEach(btn => {
    btn.addEventListener('click', () => showVersion(parseInt(btn.dataset.version)));
  });
  body.querySelectorAll('[data-action="diff"]').forEach(btn => {
    btn.addEventListener('click', () => showDiff(parseInt(btn.dataset.from), parseInt(btn.dataset.to)));
  });
}

async function showVersion(version) {
  if (!currentDoc) return;
  currentView = 'version';
  updateActionButtons('');

  const body = document.getElementById('mainBody');
  body.innerHTML = `<div class="loading">${t('loadingVersion')}</div>`;

  const rev = await fetchVersion(currentDoc.id, version);
  if (!rev) return;

  document.getElementById('versionBadge').textContent = `v${version} (${t('historical')})`;

  body.innerHTML = `
    <div class="markdown-body">
      <div style="margin-bottom:16px;padding:8px 12px;background:var(--bg-elevated);border-radius:6px;font-size:13px;color:var(--text-muted)">
        ${t('viewingVersion')} ${version} · ${new Date(rev.created_at).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US')}
        ${rev.message ? ` · ${escapeHtml(rev.message)}` : ''}
        <button class="rev-btn" style="margin-left:12px" id="backToCurrentBtn">${t('backToCurrent')}</button>
        <button class="rev-btn" style="margin-left:4px" id="backToHistoryBtn">${t('backToHistory')}</button>
      </div>
      ${marked.parse(rev.content)}
    </div>
  `;

  document.getElementById('backToCurrentBtn').addEventListener('click', showDocView);
  document.getElementById('backToHistoryBtn').addEventListener('click', showHistory);
}

async function showDiff(from, to) {
  if (!currentDoc) return;
  currentView = 'diff';
  updateActionButtons('');

  const body = document.getElementById('mainBody');
  body.innerHTML = `<div class="loading">${t('computingDiff')}</div>`;

  const data = await fetchDiff(currentDoc.id, from, to);
  if (!data) return;

  if (data.hunks.length === 0) {
    body.innerHTML = `
      <div class="diff-view">
        <div class="diff-header-info">
          <div class="diff-title">v${from} → v${to}</div>
          <button class="rev-btn" id="backToHistoryBtn2">${t('backToHistory')}</button>
        </div>
        <div class="diff-no-changes">${t('noChanges')}</div>
      </div>
    `;
    document.getElementById('backToHistoryBtn2').addEventListener('click', showHistory);
    return;
  }

  body.innerHTML = `
    <div class="diff-view">
      <div class="diff-header-info">
        <div>
          <span class="diff-title">v${from} → v${to}</span>
          <span class="diff-stats-summary" style="margin-left:12px">
            <span class="stat-add">+${data.stats.additions}</span>
            <span class="stat-del" style="margin-left:6px">-${data.stats.deletions}</span>
          </span>
        </div>
        <button class="rev-btn" id="backToHistoryBtn3">${t('backToHistory')}</button>
      </div>
      ${data.hunks.map(hunk => renderHunk(hunk)).join('')}
    </div>
  `;

  document.getElementById('backToHistoryBtn3').addEventListener('click', showHistory);
}

function renderHunk(hunk) {
  const header = `@@ -${hunk.oldStart},${hunk.oldLines} +${hunk.newStart},${hunk.newLines} @@`;
  let oldNum = hunk.oldStart;
  let newNum = hunk.newStart;

  const lines = hunk.changes.map(change => {
    let leftNum = '', rightNum = '';
    if (change.type === 'context') {
      leftNum = oldNum++;
      rightNum = newNum++;
    } else if (change.type === 'delete') {
      leftNum = oldNum++;
    } else {
      rightNum = newNum++;
    }
    return `
      <div class="diff-line ${change.type}">
        <span class="diff-line-num">${leftNum}</span>
        <span class="diff-line-num">${rightNum}</span>
        <span class="diff-line-content">${escapeHtml(change.value)}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="diff-hunk">
      <div class="diff-hunk-header">${escapeHtml(header)}</div>
      ${lines}
    </div>
  `;
}

// ===== Trash View =====
async function showTrash() {
  currentDoc = null;
  isNewDoc = false;
  currentView = 'trash';
  renderDocList();

  const header = document.getElementById('mainHeader');
  const body = document.getElementById('mainBody');
  header.style.display = 'flex';
  document.getElementById('mainTitle').textContent = t('trash');
  document.getElementById('versionBadge').textContent = '';
  document.getElementById('mainActions').innerHTML = `
    <button class="action-btn" id="btnBackToDocs">${t('backToDocs')}</button>
    <button class="action-btn danger" id="btnEmptyTrash">${t('emptyTrash')}</button>
  `;

  document.getElementById('btnBackToDocs').addEventListener('click', () => {
    currentView = 'view';
    header.style.display = 'none';
    restoreMainActions();
    body.innerHTML = `<div class="empty-state" id="emptyState">${t('selectDoc')}</div>`;
    fetchDocs();
  });

  const res = await api('/api/trash');
  if (!res) return;
  const trashDocs = await res.json();

  if (trashDocs.length === 0) {
    body.innerHTML = `<div class="empty-state">${t('trashEmpty')}</div>`;
    return;
  }

  document.getElementById('btnEmptyTrash').addEventListener('click', () => {
    showConfirm(t('emptyTrashTitle'), t('emptyTrashMsg'), async () => {
      const r = await api('/api/trash', { method: 'DELETE' });
      if (r && r.ok) {
        showToast(t('emptyTrashSuccess'), 'success');
        showTrash();
      }
    }, t('confirmEmptyTrash'));
  });

  body.innerHTML = `
    <div class="history-view">
      <ul class="revision-list">
        ${trashDocs.map(doc => `
          <li class="revision-item">
            <div class="revision-left">
              <div>
                <span class="revision-msg" style="font-weight:600;color:var(--text-bright)">${escapeHtml(doc.title)}</span>
                <span style="font-size:12px;color:var(--text-muted);margin-left:8px">v${doc.version}</span>
              </div>
              <div class="revision-time">${t('deletedAt')} ${new Date(doc.deleted_at).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US')}</div>
            </div>
            <div class="revision-right">
              <button class="rev-btn" data-action="restore" data-id="${doc.id}">${t('restore')}</button>
              <button class="rev-btn" data-action="purge" data-id="${doc.id}" style="color:var(--red)">${t('purge')}</button>
            </div>
          </li>
        `).join('')}
      </ul>
    </div>
  `;

  body.querySelectorAll('[data-action="restore"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const r = await api(`/api/trash/${btn.dataset.id}`, { method: 'POST' });
      if (r && r.ok) {
        showToast(t('restoreSuccess'), 'success');
        showTrash();
        fetchDocs();
      } else {
        showToast(t('restoreFailed'), 'error');
      }
    });
  });

  body.querySelectorAll('[data-action="purge"]').forEach(btn => {
    btn.addEventListener('click', () => {
      showConfirm(t('purgeTitle'), t('purgeMsg'), async () => {
        const r = await api(`/api/trash/${btn.dataset.id}`, { method: 'DELETE' });
        if (r && r.ok) {
          showToast(t('purgeSuccess'), 'success');
          showTrash();
        } else {
          showToast(t('purgeFailed'), 'error');
        }
      }, t('confirmPurge'));
    });
  });
}

// ===== Share Dialog =====
async function showShareDialog() {
  if (!currentDoc) return;

  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog-box" style="width:480px">
      <div class="dialog-title">${t('shareTitle')}</div>
      <div class="share-form">
        <select class="share-select" id="shareExpiry">
          <option value="60">${t('shareExpiry1h')}</option>
          <option value="1440" selected>${t('shareExpiry24h')}</option>
          <option value="10080">${t('shareExpiry7d')}</option>
          <option value="43200">${t('shareExpiry30d')}</option>
          <option value="0">${t('shareExpiryForever')}</option>
        </select>
        <button class="share-generate" id="shareGenerate">${t('shareGenerate')}</button>
      </div>
      <div class="share-link-list" id="shareLinkList">
        <div class="share-empty">${t('shareNoLinks')}</div>
      </div>
      <div class="dialog-btns" style="margin-top:16px">
        <button class="dialog-btn-cancel" id="shareClose">${t('shareClose')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  async function loadShares() {
    const res = await api(`/api/docs/${currentDoc.id}/shares`);
    if (!res) return;
    const shares = await res.json();
    const list = document.getElementById('shareLinkList');
    if (!shares.length) {
      list.innerHTML = `<div class="share-empty">${t('shareNoLinks')}</div>`;
      return;
    }
    list.innerHTML = shares.map(s => {
      const isExpired = s.expired;
      const expiryText = isExpired
        ? `<span class="share-link-expired">${t('shareExpired')}</span>`
        : (s.expires_at ? new Date(s.expires_at).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US') : t('sharePermanent'));
      return `
        <div class="share-link-item${isExpired ? ' expired' : ''}">
          <span class="share-link-url" title="${escapeHtml(s.url)}">${escapeHtml(s.url)}</span>
          <span class="share-link-expiry">${expiryText}</span>
          ${!isExpired ? `<button class="share-link-btn" data-action="copy" data-url="${escapeHtml(s.url)}">${t('shareCopy')}</button>` : ''}
          <button class="share-link-btn danger" data-action="revoke" data-id="${s.id}">${t('shareRevoke')}</button>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-action="copy"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(btn.dataset.url);
          btn.textContent = t('shareCopied');
          setTimeout(() => btn.textContent = t('shareCopy'), 1500);
        } catch { showToast('Copy failed', 'error'); }
      });
    });
    list.querySelectorAll('[data-action="revoke"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const r = await api(`/api/shares/${btn.dataset.id}`, { method: 'DELETE' });
        if (r && r.ok) {
          showToast(t('shareRevoked'), 'success');
          loadShares();
        }
      });
    });
  }

  overlay.querySelector('#shareGenerate').addEventListener('click', async () => {
    const expiresIn = parseInt(document.getElementById('shareExpiry').value);
    const r = await api(`/api/docs/${currentDoc.id}/share`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ expires_in: expiresIn })
    });
    if (r && r.ok) {
      showToast(t('shareCreated'), 'success');
      loadShares();
    } else {
      showToast(t('shareFailed'), 'error');
    }
  });

  overlay.querySelector('#shareClose').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  loadShares();
}

function restoreMainActions() {
  document.getElementById('mainActions').innerHTML = `
    <button class="action-btn" id="btnView">${t('view')}</button>
    <button class="action-btn" id="btnEdit">${t('edit')}</button>
    <button class="action-btn" id="btnHistory">${t('history')}</button>
    <button class="action-btn" id="btnRaw">${t('raw')}</button>
    <button class="action-btn" id="btnShare">${t('share')}</button>
    <button class="action-btn danger" id="btnDelete">${t('delete')}</button>
  `;
  bindMainActions();
}

function bindMainActions() {
  document.getElementById('btnView').addEventListener('click', () => {
    if (currentDoc && currentView !== 'view') showDocView();
  });
  document.getElementById('btnEdit').addEventListener('click', () => {
    if (currentDoc && currentView !== 'edit') showEditor(currentDoc);
    else if (isNewDoc) showEditor(null);
  });
  document.getElementById('btnHistory').addEventListener('click', () => {
    if (currentDoc && currentView !== 'history') showHistory();
  });
  document.getElementById('btnRaw').addEventListener('click', () => {
    if (!currentDoc) return;
    const blob = new Blob([currentDoc.content], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentDoc.title}.md`;
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('btnShare').addEventListener('click', () => {
    if (currentDoc) showShareDialog();
  });
  document.getElementById('btnDelete').addEventListener('click', handleDelete);
}

// ===== Event Handlers =====
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  fetchDocs();
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.target.value = ''; searchQuery = ''; fetchDocs(); }
});

document.getElementById('sortTime').addEventListener('click', () => {
  sortMode = sortMode === 'time-desc' ? 'time-asc' : 'time-desc';
  document.getElementById('sortTime').classList.add('active');
  document.getElementById('sortTitle').classList.remove('active');
  renderDocList();
});
document.getElementById('sortTitle').addEventListener('click', () => {
  sortMode = sortMode === 'title-asc' ? 'title-desc' : 'title-asc';
  document.getElementById('sortTitle').classList.add('active');
  document.getElementById('sortTime').classList.remove('active');
  renderDocList();
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

document.getElementById('themeBtn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : theme === 'light' ? 'auto' : 'dark';
  applyTheme();
});

// Listen for system theme changes when in auto mode
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  if (theme === 'auto') applyTheme();
});

document.getElementById('langBtn').addEventListener('click', () => {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
  renderDocList();
  // Re-render current view if showing empty state
  const empty = document.getElementById('emptyState');
  if (empty) empty.textContent = t('selectDoc');
});

document.getElementById('newDocBtn').addEventListener('click', () => {
  currentDoc = null;
  isNewDoc = true;
  renderDocList();
  showEditor(null);
  document.getElementById('sidebar').classList.remove('open');
});

bindMainActions();

document.getElementById('trashBtn').addEventListener('click', showTrash);

document.getElementById('mobileToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ===== Config =====
async function fetchConfig() {
  try {
    const res = await fetch('/api/config');
    if (res.ok) {
      const config = await res.json();
      if (config.title) {
        document.title = config.title;
        document.querySelector('.sidebar-header h1').textContent = config.title;
      }
    }
  } catch {}
}

// ===== Init =====
applyTheme();
applyLang();
fetchConfig();
fetchDocs();
</script>
