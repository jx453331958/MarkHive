<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkHive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-deep: #0a0e14;
  --bg-surface: #11151c;
  --bg-elevated: #1a1f2e;
  --bg-hover: #1e2530;
  --accent: #7c5cff;
  --accent-dim: #5a3fd6;
  --text: #c8d0da;
  --text-bright: #e8ecf0;
  --text-muted: #5a6a7e;
  --border: #1e2530;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,.12);
  --red: #f85149;
  --red-bg: rgba(248,81,73,.12);
  --sidebar-w: 280px;
  --header-h: 52px;
}
html, body { height: 100%; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  overflow: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== Layout ===== */
.app { display: flex; height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--header-h);
}
.sidebar-header h1 {
  font-size: 18px;
  color: var(--text-bright);
  font-weight: 700;
  letter-spacing: -.3px;
}
.doc-count {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 2px 8px;
  border-radius: 10px;
}
.search-box {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.doc-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.doc-item {
  padding: 10px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .15s, border-color .15s;
}
.doc-item:hover { background: var(--bg-hover); }
.doc-item.active {
  background: var(--bg-elevated);
  border-left-color: var(--accent);
}
.doc-item-title {
  font-size: 14px;
  color: var(--text-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.doc-item-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
}
.sidebar-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sort-btns { display: flex; gap: 4px; }
.sort-btn {
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
}
.sort-btn:hover { color: var(--text); border-color: var(--text-muted); }
.sort-btn.active { color: var(--accent); border-color: var(--accent); }
.logout-btn {
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}
.logout-btn:hover { color: var(--red); border-color: var(--red); }

/* ===== Main Content ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  height: var(--header-h);
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.main-title {
  font-size: 16px;
  color: var(--text-bright);
  font-weight: 600;
}
.main-actions { display: flex; gap: 6px; }
.action-btn {
  padding: 5px 12px;
  font-size: 12px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
}
.action-btn:hover { color: var(--text); border-color: var(--text-muted); }
.action-btn.active { color: var(--accent); border-color: var(--accent); }
.main-body {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 15px;
}

/* ===== Markdown Styles ===== */
.markdown-body {
  max-width: 860px;
  margin: 0 auto;
  line-height: 1.75;
  animation: fadeIn .25s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.markdown-body h1 { font-size: 28px; color: var(--text-bright); margin: 32px 0 16px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.markdown-body h2 { font-size: 22px; color: var(--text-bright); margin: 28px 0 12px; font-weight: 600; }
.markdown-body h3 { font-size: 18px; color: var(--text-bright); margin: 24px 0 10px; }
.markdown-body h4 { font-size: 15px; color: var(--accent); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: .5px; }
.markdown-body p { margin: 0 0 16px; }
.markdown-body a { color: var(--accent); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: var(--bg-elevated);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
}
.markdown-body pre {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin: 0 0 16px;
  overflow-x: auto;
}
.markdown-body pre code { background: none; padding: 0; color: var(--text); }
.markdown-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 0 0 16px;
  background: rgba(124,92,255,.05);
  color: var(--text-muted);
  font-style: italic;
}
.markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 0 0 16px; }
.markdown-body li { margin: 4px 0; }
.markdown-body li::marker { color: var(--accent); }
.markdown-body table { width: 100%; border-collapse: collapse; margin: 0 0 16px; }
.markdown-body th, .markdown-body td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.markdown-body th { background: var(--bg-elevated); color: var(--text-bright); font-weight: 600; }
.markdown-body tr:hover td { background: var(--bg-hover); }
.markdown-body img { max-width: 100%; border-radius: 8px; }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* ===== History View ===== */
.history-view {
  max-width: 860px;
  margin: 0 auto;
  animation: fadeIn .25s;
}
.history-title {
  font-size: 18px;
  color: var(--text-bright);
  margin-bottom: 20px;
}
.revision-list { list-style: none; }
.revision-item {
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .15s;
  cursor: default;
}
.revision-item:hover { background: var(--bg-elevated); }
.revision-left { flex: 1; min-width: 0; }
.revision-ver {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-right: 8px;
}
.revision-msg {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.revision-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.revision-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px; }
.revision-stats {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}
.stat-add { color: var(--green); }
.stat-del { color: var(--red); }
.rev-btn {
  padding: 4px 10px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.rev-btn:hover { color: var(--text); border-color: var(--text-muted); }

/* ===== Diff View ===== */
.diff-view {
  max-width: 960px;
  margin: 0 auto;
  animation: fadeIn .25s;
}
.diff-header-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.diff-title {
  font-size: 16px;
  color: var(--text-bright);
}
.diff-stats-summary {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
.diff-hunk {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
}
.diff-hunk-header {
  padding: 6px 12px;
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.diff-line {
  display: flex;
  min-height: 22px;
}
.diff-line-num {
  width: 44px;
  min-width: 44px;
  padding: 0 8px;
  text-align: right;
  color: var(--text-muted);
  user-select: none;
  font-size: 12px;
  line-height: 22px;
  opacity: .6;
}
.diff-line-content {
  flex: 1;
  padding: 0 12px;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 22px;
}
.diff-line.context { background: transparent; }
.diff-line.insert { background: var(--green-bg); }
.diff-line.insert .diff-line-content { color: var(--green); }
.diff-line.insert .diff-line-content::before { content: '+ '; }
.diff-line.delete { background: var(--red-bg); }
.diff-line.delete .diff-line-content { color: var(--red); }
.diff-line.delete .diff-line-content::before { content: '- '; }
.diff-line.context .diff-line-content::before { content: '  '; }
.diff-no-changes {
  padding: 32px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}

/* ===== Mobile Menu ===== */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 20;
  width: 36px;
  height: 36px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    transition: transform .25s;
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-toggle { display: flex; }
  .main-body { padding: 20px 16px; }
}

/* ===== Version Tag ===== */
.version-badge {
  display: inline-block;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 8px;
  font-family: 'JetBrains Mono', monospace;
}

/* ===== Loading ===== */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<button class="mobile-toggle" id="mobileToggle">&#9776;</button>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>MarkHive</h1>
      <span class="doc-count" id="docCount">0</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search documents...">
    </div>
    <div class="doc-list" id="docList"></div>
    <div class="sidebar-footer">
      <div class="sort-btns">
        <button class="sort-btn active" data-sort="time" id="sortTime">Time</button>
        <button class="sort-btn" data-sort="title" id="sortTitle">Title</button>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header" id="mainHeader" style="display:none">
      <div style="display:flex;align-items:center">
        <span class="main-title" id="mainTitle"></span>
        <span class="version-badge" id="versionBadge"></span>
      </div>
      <div class="main-actions" id="mainActions">
        <button class="action-btn" id="btnView">View</button>
        <button class="action-btn" id="btnHistory">History</button>
        <button class="action-btn" id="btnRaw">Raw</button>
      </div>
    </div>
    <div class="main-body" id="mainBody">
      <div class="empty-state" id="emptyState">Select a document to view</div>
    </div>
  </main>
</div>

<script>
// ===== State =====
let allDocs = [];
let currentDoc = null;
let currentView = 'view'; // view | history | diff | version
let sortMode = 'time-desc';
let searchQuery = '';

// ===== API =====
async function api(path, options = {}) {
  const res = await fetch(path, options);
  if (res.status === 401) {
    window.location.href = '/login.html';
    return null;
  }
  return res;
}

async function fetchDocs() {
  const q = searchQuery ? `?search=${encodeURIComponent(searchQuery)}` : '';
  const res = await api(`/api/docs${q}`);
  if (!res) return;
  allDocs = await res.json();
  renderDocList();
}

async function fetchDoc(id) {
  const res = await api(`/api/docs/${id}`);
  if (!res) return null;
  return res.json();
}

async function fetchHistory(id) {
  const res = await api(`/api/docs/${id}/history`);
  if (!res) return null;
  return res.json();
}

async function fetchVersion(id, version) {
  const res = await api(`/api/docs/${id}/versions/${version}`);
  if (!res) return null;
  return res.json();
}

async function fetchDiff(id, from, to) {
  const res = await api(`/api/docs/${id}/diff?from=${from}&to=${to}`);
  if (!res) return null;
  return res.json();
}

// ===== Rendering =====
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function sortDocs(docs) {
  const sorted = [...docs];
  switch (sortMode) {
    case 'time-desc': sorted.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at)); break;
    case 'time-asc': sorted.sort((a, b) => new Date(a.updated_at) - new Date(b.updated_at)); break;
    case 'title-asc': sorted.sort((a, b) => a.title.localeCompare(b.title, 'zh')); break;
    case 'title-desc': sorted.sort((a, b) => b.title.localeCompare(a.title, 'zh')); break;
  }
  return sorted;
}

function renderDocList() {
  const list = document.getElementById('docList');
  const sorted = sortDocs(allDocs);
  document.getElementById('docCount').textContent = allDocs.length;

  list.innerHTML = sorted.map(doc => `
    <div class="doc-item${currentDoc && currentDoc.id === doc.id ? ' active' : ''}"
         data-id="${doc.id}">
      <div class="doc-item-title">${escapeHtml(doc.title)}</div>
      <div class="doc-item-meta">v${doc.version} · ${formatTime(doc.updated_at)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.doc-item').forEach(el => {
    el.addEventListener('click', () => selectDoc(el.dataset.id));
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function selectDoc(id) {
  const doc = await fetchDoc(id);
  if (!doc) return;
  currentDoc = doc;
  currentView = 'view';
  renderDocList();
  showDocView();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function showDocView() {
  const header = document.getElementById('mainHeader');
  const body = document.getElementById('mainBody');
  const empty = document.getElementById('emptyState');

  header.style.display = 'flex';
  if (empty) empty.style.display = 'none';
  document.getElementById('mainTitle').textContent = currentDoc.title;
  document.getElementById('versionBadge').textContent = `v${currentDoc.version}`;

  // Update active button
  updateActionButtons('view');

  body.innerHTML = `<div class="markdown-body">${marked.parse(currentDoc.content)}</div>`;
}

function updateActionButtons(active) {
  ['btnView', 'btnHistory', 'btnRaw'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === `btn${active.charAt(0).toUpperCase() + active.slice(1)}`);
  });
}

async function showHistory() {
  if (!currentDoc) return;
  currentView = 'history';
  updateActionButtons('history');

  const body = document.getElementById('mainBody');
  body.innerHTML = '<div class="loading">Loading history...</div>';

  const data = await fetchHistory(currentDoc.id);
  if (!data) return;

  const revisions = data.revisions;
  body.innerHTML = `
    <div class="history-view">
      <div class="history-title">Version History</div>
      <ul class="revision-list">
        ${revisions.map((rev, idx) => `
          <li class="revision-item">
            <div class="revision-left">
              <div>
                <span class="revision-ver">v${rev.version}</span>
                <span class="revision-msg">${escapeHtml(rev.message || '(no message)')}</span>
              </div>
              <div class="revision-time">${new Date(rev.created_at).toLocaleString('zh-CN')}</div>
            </div>
            <div class="revision-right">
              <span class="revision-stats">
                ${rev.additions > 0 ? `<span class="stat-add">+${rev.additions}</span>` : ''}
                ${rev.deletions > 0 ? ` <span class="stat-del">-${rev.deletions}</span>` : ''}
                ${rev.additions === 0 && rev.deletions === 0 ? '<span style="color:var(--text-muted)">no change</span>' : ''}
              </span>
              <button class="rev-btn" data-action="view-version" data-version="${rev.version}">View</button>
              ${idx < revisions.length - 1 ? `
                <button class="rev-btn" data-action="diff"
                        data-from="${revisions[idx + 1].version}"
                        data-to="${rev.version}">Diff</button>
              ` : ''}
            </div>
          </li>
        `).join('')}
      </ul>
    </div>
  `;

  body.querySelectorAll('[data-action="view-version"]').forEach(btn => {
    btn.addEventListener('click', () => showVersion(parseInt(btn.dataset.version)));
  });
  body.querySelectorAll('[data-action="diff"]').forEach(btn => {
    btn.addEventListener('click', () => showDiff(parseInt(btn.dataset.from), parseInt(btn.dataset.to)));
  });
}

async function showVersion(version) {
  if (!currentDoc) return;
  currentView = 'version';
  updateActionButtons('');

  const body = document.getElementById('mainBody');
  body.innerHTML = '<div class="loading">Loading version...</div>';

  const rev = await fetchVersion(currentDoc.id, version);
  if (!rev) return;

  document.getElementById('versionBadge').textContent = `v${version} (historical)`;

  body.innerHTML = `
    <div class="markdown-body">
      <div style="margin-bottom:16px;padding:8px 12px;background:var(--bg-elevated);border-radius:6px;font-size:13px;color:var(--text-muted)">
        Viewing version ${version} · ${new Date(rev.created_at).toLocaleString('zh-CN')}
        ${rev.message ? ` · ${escapeHtml(rev.message)}` : ''}
        <button class="rev-btn" style="margin-left:12px" id="backToCurrentBtn">Back to current</button>
        <button class="rev-btn" style="margin-left:4px" id="backToHistoryBtn">Back to history</button>
      </div>
      ${marked.parse(rev.content)}
    </div>
  `;

  document.getElementById('backToCurrentBtn').addEventListener('click', showDocView);
  document.getElementById('backToHistoryBtn').addEventListener('click', showHistory);
}

async function showDiff(from, to) {
  if (!currentDoc) return;
  currentView = 'diff';
  updateActionButtons('');

  const body = document.getElementById('mainBody');
  body.innerHTML = '<div class="loading">Computing diff...</div>';

  const data = await fetchDiff(currentDoc.id, from, to);
  if (!data) return;

  if (data.hunks.length === 0) {
    body.innerHTML = `
      <div class="diff-view">
        <div class="diff-header-info">
          <div class="diff-title">v${from} → v${to}</div>
          <button class="rev-btn" id="backToHistoryBtn2">Back to history</button>
        </div>
        <div class="diff-no-changes">No changes between these versions</div>
      </div>
    `;
    document.getElementById('backToHistoryBtn2').addEventListener('click', showHistory);
    return;
  }

  body.innerHTML = `
    <div class="diff-view">
      <div class="diff-header-info">
        <div>
          <span class="diff-title">v${from} → v${to}</span>
          <span class="diff-stats-summary" style="margin-left:12px">
            <span class="stat-add">+${data.stats.additions}</span>
            <span class="stat-del" style="margin-left:6px">-${data.stats.deletions}</span>
          </span>
        </div>
        <button class="rev-btn" id="backToHistoryBtn3">Back to history</button>
      </div>
      ${data.hunks.map(hunk => renderHunk(hunk)).join('')}
    </div>
  `;

  document.getElementById('backToHistoryBtn3').addEventListener('click', showHistory);
}

function renderHunk(hunk) {
  const header = `@@ -${hunk.oldStart},${hunk.oldLines} +${hunk.newStart},${hunk.newLines} @@`;
  let oldNum = hunk.oldStart;
  let newNum = hunk.newStart;

  const lines = hunk.changes.map(change => {
    let leftNum = '', rightNum = '';
    if (change.type === 'context') {
      leftNum = oldNum++;
      rightNum = newNum++;
    } else if (change.type === 'delete') {
      leftNum = oldNum++;
    } else {
      rightNum = newNum++;
    }
    return `
      <div class="diff-line ${change.type}">
        <span class="diff-line-num">${leftNum}</span>
        <span class="diff-line-num">${rightNum}</span>
        <span class="diff-line-content">${escapeHtml(change.value)}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="diff-hunk">
      <div class="diff-hunk-header">${escapeHtml(header)}</div>
      ${lines}
    </div>
  `;
}

// ===== Event Handlers =====
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  fetchDocs();
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.target.value = ''; searchQuery = ''; fetchDocs(); }
});

document.getElementById('sortTime').addEventListener('click', () => {
  sortMode = sortMode === 'time-desc' ? 'time-asc' : 'time-desc';
  document.getElementById('sortTime').classList.add('active');
  document.getElementById('sortTitle').classList.remove('active');
  renderDocList();
});
document.getElementById('sortTitle').addEventListener('click', () => {
  sortMode = sortMode === 'title-asc' ? 'title-desc' : 'title-asc';
  document.getElementById('sortTitle').classList.add('active');
  document.getElementById('sortTime').classList.remove('active');
  renderDocList();
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

document.getElementById('btnView').addEventListener('click', () => {
  if (currentDoc && currentView !== 'view') showDocView();
});
document.getElementById('btnHistory').addEventListener('click', () => {
  if (currentDoc && currentView !== 'history') showHistory();
});
document.getElementById('btnRaw').addEventListener('click', () => {
  if (!currentDoc) return;
  const blob = new Blob([currentDoc.content], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentDoc.title}.md`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('mobileToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ===== Init =====
fetchDocs();
</script>
</body>
</html>
